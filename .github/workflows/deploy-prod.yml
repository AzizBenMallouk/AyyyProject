name: Deploy to Prod (Blue-Green)

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push Backend image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: youcode-backend-prod
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG youcode-backend
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Build and push Frontend image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: youcode-frontend-prod
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG youcode-frontend
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy-to-idle:
    runs-on: ubuntu-latest
    needs: build-and-push
    outputs:
      new_color: ${{ steps.determine-color.outputs.new_color }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Update EKS kubeconfig
      run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

    - name: Determine active and idle colors
      id: determine-color
      run: |
        CURRENT_COLOR=$(kubectl get svc youcode-frontend-prod -n youcode-prod -o jsonpath='{.spec.selector.color}')
        if [ "$CURRENT_COLOR" == "blue" ]; then
          echo "new_color=green" >> $GITHUB_OUTPUT
        else
          echo "new_color=blue" >> $GITHUB_OUTPUT
        fi

    - name: Deploy to Idle environment
      env:
        NEW_COLOR: ${{ steps.determine-color.outputs.new_color }}
        REGISTRY: ${{ needs.build-and-push.outputs.registry }}
      run: |
        cd k8s/overlays/prod-${NEW_COLOR}
        kustomize edit set image youcode-backend=${REGISTRY}/youcode-backend-prod:${{ github.sha }}
        kustomize edit set image youcode-frontend=${REGISTRY}/youcode-frontend-prod:${{ github.sha }}
        kustomize build . | kubectl apply -f -

    - name: Wait for deployment
      run: |
        kubectl rollout status deployment/youcode-backend-${{ steps.determine-color.outputs.new_color }} -n youcode-prod
        kubectl rollout status deployment/youcode-frontend-${{ steps.determine-color.outputs.new_color }} -n youcode-prod

  promote-to-active:
    runs-on: ubuntu-latest
    needs: [deploy-to-idle]
    environment: production-approval # This enables manual approval in GitHub Actions
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Update EKS kubeconfig
      run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

    - name: Switch traffic to new active color
      env:
        NEW_COLOR: ${{ needs.deploy-to-idle.outputs.new_color }}
      run: |
        kubectl patch svc youcode-backend-prod -n youcode-prod -p '{"spec":{"selector":{"color":"'${NEW_COLOR}'"}}}'
        kubectl patch svc youcode-frontend-prod -n youcode-prod -p '{"spec":{"selector":{"color":"'${NEW_COLOR}'"}}}'
