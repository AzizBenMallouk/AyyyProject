name: Build and Deploy

on:
  push:
    branches: [ "main" ]
    paths:
      - 'app-backend/**'
      - 'app-frontend/**'
      - 'gitops/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      build_all:
        description: 'Force build and deploy all components'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend || github.event.inputs.build_all == 'true' }}
      frontend: ${{ steps.filter.outputs.frontend || github.event.inputs.build_all == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'app-backend/**'
            frontend:
              - 'app-frontend/**'

  build-and-push:
    needs: filter
    if: needs.filter.outputs.backend == 'true' || needs.filter.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend
        if: needs.filter.outputs.frontend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./app-frontend
          push: true
          platforms: linux/arm64
          tags: ${{ steps.login-ecr.outputs.registry }}/app-frontend-prod:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Backend
        if: needs.filter.outputs.backend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./app-backend
          push: true
          platforms: linux/arm64
          tags: ${{ steps.login-ecr.outputs.registry }}/app-backend-prod:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [filter, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update GitOps Kustomization
        run: |
          cd gitops/overlays/prod
          if [ "${{ needs.filter.outputs.frontend }}" == "true" ]; then
            kustomize edit set image ${{ steps.login-ecr.outputs.registry }}/app-frontend-prod=${{ steps.login-ecr.outputs.registry }}/app-frontend-prod:latest
          fi
          if [ "${{ needs.filter.outputs.backend }}" == "true" ]; then
            kustomize edit set image ${{ steps.login-ecr.outputs.registry }}/app-backend-prod=${{ steps.login-ecr.outputs.registry }}/app-backend-prod:latest
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/overlays/prod/kustomization.yaml
          git commit -m "chore: deploy latest images [skip ci]" || echo "No changes to commit"
          git push

      - name: Post preview review instructions
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          echo "## 🟢 Preview Deployment Ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHORT_SHA}\` — ${{ github.event.head_commit.message }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Author** | ${{ github.event.head_commit.author.name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔍 How to review before promoting" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend preview:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "kubectl port-forward svc/youcode-frontend-preview 8080:80" >> $GITHUB_STEP_SUMMARY
          echo "# Then open: http://localhost:8080" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Backend preview:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "kubectl port-forward svc/youcode-backend-preview 8082:8082" >> $GITHUB_STEP_SUMMARY
          echo "# Then open: http://localhost:8082/actuator/health" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Check rollout status:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "kubectl argo rollouts get rollout youcode-backend" >> $GITHUB_STEP_SUMMARY
          echo "kubectl argo rollouts get rollout youcode-frontend" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ **The \`promote\` job is waiting for your approval in GitHub Environments.**" >> $GITHUB_STEP_SUMMARY
          echo "> Review the preview, then go to the **Actions** tab → approve or reject the deployment." >> $GITHUB_STEP_SUMMARY

  promote:
    needs: [filter, deploy]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Cache argo-rollouts plugin
        id: cache-rollouts
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/kubectl-argo-rollouts
          key: ${{ runner.os }}-argo-rollouts-v1.6.0

      - name: Install kubectl argo rollouts plugin
        if: steps.cache-rollouts.outputs.cache-hit != 'true'
        run: |
          curl -LO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
          chmod +x ./kubectl-argo-rollouts-linux-amd64
          sudo mv ./kubectl-argo-rollouts-linux-amd64 /usr/local/bin/kubectl-argo-rollouts

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}


      - name: Promote Backend
        if: needs.filter.outputs.backend == 'true'
        run: kubectl argo rollouts promote youcode-backend

      - name: Promote Frontend
        if: needs.filter.outputs.frontend == 'true'
        run: kubectl argo rollouts promote youcode-frontend

  # ─────────────────────────────────────────────────────────
  # Feature Announcement — runs only when commit msg starts with "feature"
  # ─────────────────────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'feature')
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # Need parent commit to compute diff

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build diff summary
        id: diff
        run: |
          SUMMARY=$(git diff HEAD~1 HEAD --stat | tail -1)
          FILES=$(git diff HEAD~1 HEAD --name-only | head -20 | tr '\n' ', ')
          echo "summary=${SUMMARY}" >> $GITHUB_OUTPUT
          echo "files=${FILES}" >> $GITHUB_OUTPUT

      - name: Send feature event to SQS
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "commit_sha": "${{ github.sha }}",
            "commit_message": "${{ github.event.head_commit.message }}",
            "author": "${{ github.event.head_commit.author.name }}",
            "diff_summary": "${{ steps.diff.outputs.summary }} — files changed: ${{ steps.diff.outputs.files }}"
          }
          EOF
          )
          aws sqs send-message \
            --queue-url "${{ secrets.FEATURE_ANNOUNCEMENTS_SQS_URL }}" \
            --message-body "$PAYLOAD" \
            --region "${{ secrets.AWS_REGION }}"
