---
# ServiceMonitor for the Backend (Spring Boot - /actuator/prometheus)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: youcode-backend
  namespace: monitoring
  labels:
    release: prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: youcode-backend
  endpoints:
    - port: http        # matches the port name in the backend Service
      path: /actuator/prometheus
      interval: 30s
      scheme: http

---
# ServiceMonitor for the Frontend (Next.js metrics if exposed, or basic up check)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: youcode-frontend
  namespace: monitoring
  labels:
    release: prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: youcode-frontend
  endpoints:
    - port: http        # matches the port name in the frontend Service
      path: /metrics
      interval: 30s
      scheme: http
